name: Spec Correction
description: Report a logical inconsistency, notation error, or glossary gap in the base spec
labels: ["spec-correction"]
body:
  - type: input
    id: section
    attributes:
      label: Spec Section
      description: Which section is affected? (e.g. §4 SPT, §5.3 O-Phase)
      placeholder: "§X.Y Section Name"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Description
      description: What is the inconsistency or error?
      placeholder: Describe the problem with reference to the spec text.
    validations:
      required: true
  - type: textarea
    id: proposed-fix
    attributes:
      label: Proposed Fix
      description: If possible, provide a fix in TPMN notation.
      placeholder: "Optional: suggested correction in TPMN notation"
    validations:
      required: false
